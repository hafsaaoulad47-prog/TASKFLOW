version: "3.9"
services:
  mongo:
    image: mongo:7
    container_name: taskflow_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: taskflow

  backend:
    build: ./backend
    container_name: taskflow_backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: taskflow_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data:
