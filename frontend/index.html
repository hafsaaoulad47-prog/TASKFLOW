<!DOCTYPE html>
<html>
<head>
    <title>TaskFlow - Fonctionnalité 7</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f0e7f0, #f8f2f8);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h2 {
            text-align: center;
            color: #333;
        }
        label {
            display: block;
            margin-top: 10px;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin: 5px 0 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #0c0c79;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #ede0e8;
        }
        .draft-alert {
            background: #ebdbeb;
            border: 1px solid #131113;
            padding: 10px;
            margin-top: 15px;
            border-radius: 5px;
            display: none;
            text-align: center;
        }
        .draft-alert button {
            width: auto;
            background: #950495;
            margin-left: 10px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>✨Ajouter une tache</h2>
        
        <form id="taskForm">
            <label>Titre de la tâche</label>
            <input type="text" id="title" placeholder="Titre" required>
            
            <label>Description</label>
            <textarea id="description" placeholder="Description détaillée..." rows="3"></textarea>
            
            <label>Priorité</label>
            <select id="priority">
                <option value="basse"> Basse</option>
                <option value="moyenne" selected> Moyenne</option>
                <option value="haute">Haute</option>
            </select>
            
            <label>Statut</label>
            <select id="status">
                <option value="en cours">🔄 En cours</option>
                <option value="terminé">✅ Terminé</option>
                <option value="à refaire">🔁 À refaire</option>
            </select>
            
            <button type="submit">💾 Enregistrer</button>
        </form>
        
        <div id="draftAlert" class="draft-alert">
            💾 Un brouillon sauvegardé existe
            <button id="restoreBtn">📂 Restaurer</button>
        </div>
    </div>

    <script>
     
        const PROJECT_ID = 'mon-projet-1';
        const DRAFT_KEY = 'task_draft_' + PROJECT_ID;
        
        // Fetch items
        const form = document.getElementById('taskForm');
        const title = document.getElementById('title');
        const description = document.getElementById('description');
        const priority = document.getElementById('priority');
        const status = document.getElementById('status');
        const draftAlert = document.getElementById('draftAlert');
        
        //Auto-save
        function autoSave() {
            const draft = {
                title: title.value,
                description: description.value,
                priority: priority.value,
                status: status.value
            };
            localStorage.setItem(DRAFT_KEY, JSON.stringify(draft));
            console.log("✅ brouillon sauvegarde a " + DRAFT_KEY);
        }
        // Restore draft
        function restoreDraft() {
            const saved = localStorage.getItem(DRAFT_KEY);
            if (saved) {
                const draft = JSON.parse(saved);
                title.value = draft.title || '';
                description.value = draft.description || '';
                priority.value = draft.priority || 'moyenne';
                status.value = draft.status || 'en cours';
                draftAlert.style.display = 'none';
                console.log('📂Restaure');
            }
        }
        
        // validate draft
        function checkForDraft() {
            if (localStorage.getItem(DRAFT_KEY)) {
                draftAlert.style.display = 'block';
                console.log('🔔 Brouillon existant');
            }
        }
        
        // Delete draft
        function clearDraft() {
            localStorage.removeItem(DRAFT_KEY);
            draftAlert.style.display = 'none';
            console.log('🗑️ le brouillon a ete supprime');
        }
        
        // events
        form.addEventListener('input', autoSave);
        document.getElementById('restoreBtn').addEventListener('click', restoreDraft);
        
    
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const taskData = {
                title: title.value,
                description: description.value,
                priority: priority.value,
                status: status.value,
                projectId: PROJECT_ID
            };
            
            try {
                const response = await fetch('/api/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(taskData)
                });
                
                if (response.ok) {
                    alert('✅ Tache cree avec succes!');
                    clearDraft();
                    form.reset();
                    status.value = 'en cours';
                } else {
                    alert('❌ Erreur lors de la creation');
                }
            } catch (error) {
                alert('❌ Erreur de connexion au serveur');
            }
        });
        
        // on page load
        checkForDraft();
    </script>
</body>
</html>
