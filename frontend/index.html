<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>TaskFlow</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- Navbar -->

  <nav class="navbar">

    <div class="logo-small">
      TaskFlow
    </div>

    <div class="nav-links">

      <button>
        Dashboard
      </button>

      <button>
        Projects
      </button>

      <button>
        Tasks
      </button>

    </div>

    <div class="nav-right">

      <span id="user-name">
        Hafssa
      </span>

      <!-- Notification Bell -->

      <div class="notif-bell" id="notif-bell">

        🔔

        <span class="badge"
              id="notification-count">

          0

        </span>

      </div>

    </div>

  </nav>



  <!-- Notifications Panel -->

  <div class="notif-panel"
       id="notification-list">

  </div>



  <!-- Main Content -->

  <main class="main-content">

    <!-- Page Header -->

    <div class="page-header">

      <h2>
        Dashboard
      </h2>

      <button class="btn-primary">

        New Project

      </button>

    </div>



    <!-- Statistics -->

    <div class="stats-grid">

      <div class="stat-card">

        <div class="stat-num">
          12
        </div>

        <div class="stat-label">
          Total Projects
        </div>

      </div>



      <div class="stat-card green">

        <div class="stat-num">
          8
        </div>

        <div class="stat-label">
          Completed Tasks
        </div>

      </div>



      <div class="stat-card red">

        <div class="stat-num">
          3
        </div>

        <div class="stat-label">
          Pending Tasks
        </div>

      </div>

    </div>



    <!-- Activity Feed -->

    <section>

      <h2>
        Activity Feed
      </h2>

      <div id="activity-feed">

      </div>

    </section>



    <!-- Projects Example -->

    <section style="margin-top: 2rem;">

      <h2>
        Projects
      </h2>

      <div class="projects-grid">

        <div class="project-card">

          <h3>
            Website Redesign
          </h3>

          <p>
            UI/UX improvements for the client dashboard
          </p>

          <div class="project-card-footer">

            <span class="badge-status badge-actif">

              Active

            </span>

            <div class="card-actions">

              <button class="btn-sm">
                Edit
              </button>

              <button class="btn-danger">
                Delete
              </button>

            </div>

          </div>

        </div>



        <div class="project-card">

          <h3>
            Mobile App
          </h3>

          <p>
            Build notification system and API integration
          </p>

          <div class="project-card-footer">

            <span class="badge-status badge-en-pause">

              In Progress

            </span>

            <div class="card-actions">

              <button class="btn-sm">
                Edit
              </button>

              <button class="btn-danger">
                Delete
              </button>

            </div>

          </div>

        </div>

      </div>

    </section>

  </main>



  <script src="app.js"></script>

</body>
</html>
