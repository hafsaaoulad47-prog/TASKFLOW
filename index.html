<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow - Mes Tâches</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>

  <nav class="navbar">
    <span class="logo-small">TaskFlow</span>
    <div class="nav-links">
      <button onclick="showPage('tasks')">Mes Tâches</button>
    </div>
    <div class="nav-right">
      <span id="user-name">Hafida (Dev)</span>
    </div>
  </nav>

  <main class="main-content">
    
    <div id="page-tasks" class="page">
      <div class="page-header">
        <h2>Gestion des Tâches</h2>
        <button class="btn-primary" onclick="openTaskModal()">+ Nouvelle tâche</button>
      </div>
      
      <div class="filters">
        <select id="filter-project" onchange="loadTasks()"><option value="">Tous les projets</option></select>
        <select id="filter-status" onchange="loadTasks()">
          <option value="">Tous statuts</option>
          <option value="à faire">À faire</option>
          <option value="en cours">En cours</option>
          <option value="terminé">Terminé</option>
        </select>
        <select id="filter-priority" onchange="loadTasks()">
          <option value="">Toutes priorités</option>
          <option value="basse">Basse</option>
          <option value="moyenne">Moyenne</option>
          <option value="haute">Haute</option>
        </select>
        <input type="text" id="filter-search" placeholder="Rechercher..." oninput="loadTasks()" />
      </div>
      
      <div id="tasks-list" class="task-list"></div>
      <div id="tasks-pagination" class="pagination"></div>
    </div>

  </main>

  <div id="task-modal" class="modal" style="display:none">
    <div class="modal-content">
      <h3 id="task-modal-title">Nouvelle tâche</h3>
      <input type="hidden" id="task-id" />
      <input type="text" id="task-title" placeholder="Titre *" />
      <textarea id="task-desc" placeholder="Description (optionnel)"></textarea>
      
      <select id="task-project">
        <option value="">Sélectionner un projet *</option>
      </select>
      
      <select id="task-priority">
        <option value="basse">Priorité basse</option>
        <option value="moyenne">Priorité moyenne</option>
        <option value="haute">Priorité haute</option>
      </select>
      
      <select id="task-status">
        <option value="à faire">À faire</option>
        <option value="en cours">En cours</option>
        <option value="terminé">Terminé</option>
      </select>
      
      <select id="task-assignedTo">
        <option value="">Non assigné</option>
      </select>
      
      <input type="date" id="task-deadline" />
      
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeModal('task-modal')">Annuler</button>
        <button class="btn-primary" onclick="saveTask()">Enregistrer</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
